<!DOCTYPE html>
<html>
<head>
  <title>Login - Santra Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; background: #f5f5; }
    .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0.1); }
    button, input { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
    .google-btn { background: #4285f4; color: white; border: none; cursor: pointer; }
    .otp-btn { background: #34a853; color: white; border: none; cursor: pointer; }
    .logout-btn { background: #ea4335; color: white; border: none; cursor: pointer; }
    #recaptcha-container { margin: 10px 0; }
    h2 { text-align: center; color: #ff6b00; margin-top: 0; }
    #userInfo { text-align: center; margin-bottom: 15px; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🍊 Santra Market Login</h2>
    
    <!-- Login ke baad ye dikhega -->
    <div id="userInfo">
      <p>Logged in as: <b id="userName"></b></p>
      <button class="logout-btn" id="logout">Logout</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <button class="google-btn" id="googleLogin">Sign in with Google</button>
      
      <hr style="margin: 20px 0;">
      
      <h3>Phone OTP Login</h3>
      <input type="tel" id="phoneNumber" placeholder="Enter phone number with +91">
      <div id="recaptcha-container"></div>
      <button class="otp-btn" id="sendOtp">Send OTP</button>
      
      <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" style="display:none;">
      <button class="otp-btn" id="verifyOtp" style="display:none;">Verify OTP</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ⚠️ YAHAN APNA FIREBASE CONFIG DAALNA
    const firebaseConfig = {
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyApXIGoX071cYEvGbfhBF69DB9Kv5YlSMA",
  authDomain: "santramarketshoppingmall.firebaseapp.com",
  projectId: "santramarketshoppingmall",
  storageBucket: "santramarketshoppingmall.firebasestorage.app",
  messagingSenderId: "398490252924",
  appId: "1:398490252924:web:d1b6348b549183b93b7bf9",
  measurementId: "G-ZW1ZR8HETY"
};
      
    

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Check karta hai user login hai ya nahi
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('userName').innerText = user.displayName || user.phoneNumber;
      } else {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('userInfo').style.display = 'none';
      }
    });

    // Google Login
    document.getElementById('googleLogin').onclick = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(() => { window.location.href = "index.html"; })
        .catch((error) => alert("Error: " + error.message));
    };

    // Phone OTP Login
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });

    document.getElementById('sendOtp').onclick = () => {
      const phoneNumber = document.getElementById('phoneNumber').value;
      signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("OTP Sent!");
          document.getElementById('otpCode').style.display = 'block';
          document.getElementById('verifyOtp').style.display = 'block';
          document.getElementById('sendOtp').style.display = 'none';
        })
        .catch((error) => alert("Error: " + error.message));
    };

    document.getElementById('verifyOtp').onclick = () => {
      const code = document.getElementById('otpCode').value;
      window.confirmationResult.confirm(code)
        .then(() => { window.location.href = "index.html"; })
        .catch((error) => alert("Wrong OTP: " + error.message));
    };

    // Logout
    document.getElementById('logout').onclick = () => {
      signOut(auth);
    };
  </script>
</body>
</html>
